<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Char &amp; Bone BBQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/site.css">
</head>
<body>
  <header class="site-header">
    <span class="logo">Char &amp; Bone BBQ</span>
    <nav>
      <a href="/">Home</a>
      <a href="/order">Menu</a>
      <a href="/checkout" aria-current="page">Checkout</a>
      <a href="/portal">Customer portal</a>
      <a href="/admin">Admin</a>
    </nav>
  </header>

  <main class="page-checkout">
    <div>
      <h1 style="margin-top:0">Checkout</h1>
      <div class="alert alert-error" id="checkout-error" style="display:none" role="alert"></div>

      <form id="checkout-form" class="form-grid">
        <h2 style="margin:0 0 0.5rem;font-size:1.35rem">Contact</h2>
        <label>
          Full name
          <input type="text" id="cust-name" name="name" required autocomplete="name">
        </label>
        <label>
          Phone
          <input type="tel" id="cust-phone" name="phone" required autocomplete="tel">
        </label>
        <label>
          Email <span class="muted">(match your <a href="/portal/register">portal account</a>)</span>
          <input type="email" id="cust-email" name="email" autocomplete="email">
        </label>
        <p class="muted small" style="margin:0">Use the same email you registered with so orders show in <a href="/customer-portal">your portal</a>.</p>

        <h2 style="margin:1rem 0 0.5rem;font-size:1.35rem">Fulfillment</h2>
        <div class="radio-row">
          <label><input type="radio" name="fulfillment" value="pickup" checked> Pickup</label>
          <label><input type="radio" name="fulfillment" value="delivery"> Delivery (+ fee)</label>
        </div>

        <div id="delivery-address-wrap" class="form-grid" style="display:none">
          <label>
            Street address
            <input type="text" id="addr-line1" autocomplete="address-line1">
          </label>
          <label>
            Apt / suite
            <input type="text" id="addr-line2" autocomplete="address-line2">
          </label>
          <label>
            City
            <input type="text" id="addr-city" autocomplete="address-level2">
          </label>
          <label>
            ZIP
            <input type="text" id="addr-zip" autocomplete="postal-code">
          </label>
        </div>

        <label>
          Requested date &amp; time
          <input type="datetime-local" id="cust-when" name="when">
        </label>
        <label>
          Special instructions
          <textarea id="cust-notes" name="notes" placeholder="Allergies, gate codes, sauce on the side…"></textarea>
        </label>

        <h2 style="margin:1rem 0 0.5rem;font-size:1.35rem">Payment</h2>
        <div class="pay-options">
          <label class="radio-row" style="display:flex">
            <input type="radio" name="payment" value="pickup" checked>
            <span>Pay at pickup / on delivery <span class="muted">(cash or card in person)</span></span>
          </label>
          <label class="radio-row" style="display:flex">
            <input type="radio" name="payment" value="online">
            <span>Pay online <span class="muted">(requires Stripe in Vercel env)</span></span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Place order</button>
      </form>
    </div>

    <aside class="summary-card">
      <h2>Summary</h2>
      <div id="checkout-summary"><p class="muted">Loading…</p></div>
      <p class="muted" style="font-size:0.9rem;margin-bottom:0">Tax rate and delivery fee are set in <code>menu.json</code>. Adjust for your location.</p>
    </aside>
  </main>

  <footer class="site-footer">
    &copy; Char &amp; Bone BBQ · Columbia, SC
  </footer>

  <script src="/js/cart.js"></script>
  <script src="/js/orders-sync.js"></script>
  <script src="/js/checkout-page.js"></script>
</body>
</html>
