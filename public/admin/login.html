<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#1a1410">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Char & Bone">
  <title>Admin sign in — Char &amp; Bone BBQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/site.css">
</head>
<body>
  <header class="site-header">
    <span class="logo">Char &amp; Bone BBQ</span>
    <nav>
      <a href="/">Home</a>
      <a href="/order">Menu</a>
      <a href="/portal">Customer portal</a>
    </nav>
  </header>

  <main class="section" style="max-width:420px;margin:2rem auto">
    <h1 style="margin-top:0">Admin</h1>

    <div id="admin-login-error" class="alert alert-error" style="display:none;margin-top:1rem"></div>

    <form id="admin-login-form" class="form-grid" style="margin-top:1.5rem">
      <label>
        Email
        <input type="email" id="admin-email" name="email" required autocomplete="username">
      </label>
      <label>
        Password
        <input type="password" id="admin-password" name="password" required autocomplete="current-password">
      </label>
      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    </form>
  </main>

  <footer class="site-footer">
    &copy; Char &amp; Bone BBQ
    <div class="footer-legal"><a href="/terms">Terms</a> · <a href="/privacy">Privacy</a></div>
  </footer>

  <script>
    (function () {
      var form = document.getElementById('admin-login-form');
      var err = document.getElementById('admin-login-error');
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        err.style.display = 'none';
        var email = document.getElementById('admin-email').value.trim();
        var password = document.getElementById('admin-password').value;
        fetch('/api/auth/admin-login', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password }),
        })
          .then(function (r) {
            return r.json().then(function (j) {
              return { ok: r.ok, body: j };
            });
          })
          .then(function (res) {
            if (res.ok) {
              window.location.href = '/admin/';
              return;
            }
            err.textContent = (res.body && res.body.error) || 'Sign in failed';
            err.style.display = 'block';
          })
          .catch(function () {
            err.textContent = 'Network error';
            err.style.display = 'block';
          });
      });
    })();
  </script>
  <script src="/js/pwa-register.js" defer></script>
</body>
</html>
