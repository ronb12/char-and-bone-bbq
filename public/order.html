<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu &amp; order — Char &amp; Bone BBQ</title>
  <meta name="description" content="Order slow-smoked BBQ for pickup or delivery in Columbia, SC.">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/site.css">
</head>
<body>
  <header class="site-header">
    <span class="logo">Char &amp; Bone BBQ</span>
    <nav>
      <a href="/">Home</a>
      <a href="/order" aria-current="page">Menu</a>
      <a href="/checkout">Checkout <span class="cart-badge" data-cart-badge style="display:none">0</span></a>
      <a href="/portal">Customer portal</a>
      <a href="/admin">Admin</a>
    </nav>
  </header>

  <div class="cart-backdrop" id="cart-backdrop" aria-hidden="true"></div>

  <div class="layout-order">
    <div>
      <h1 class="tagline" style="text-align:left;margin:0 0 0.5rem;letter-spacing:0.08em">Order BBQ</h1>
      <p class="muted" style="margin-top:0">Pickup or delivery · Columbia, SC</p>
      <div class="menu-toolbar" id="menu-nav"></div>
      <div id="menu-root"></div>
    </div>

    <aside class="cart-panel" id="cart-panel" aria-label="Shopping cart">
      <h2>Your order</h2>
      <p class="cart-empty" id="cart-empty-msg">Add items from the menu.</p>
      <div id="cart-lines"></div>
      <div id="cart-totals" class="cart-totals" style="display:none"></div>
      <a class="btn btn-primary btn-block" href="/checkout" id="cart-checkout" style="margin-top:1rem;display:none">Proceed to checkout</a>
    </aside>
  </div>

  <div class="cart-mobile-bar">
    <button type="button" class="btn btn-secondary" id="cart-open-mobile">View cart</button>
    <span class="sum" id="cart-mobile-sum">Cart empty</span>
    <a class="btn btn-primary" href="/checkout">Checkout</a>
  </div>

  <footer class="site-footer">
    &copy; Char &amp; Bone BBQ · Columbia, SC
    <span class="photo-credit" style="display:block;margin-top:0.5rem">Menu photos via <a href="https://unsplash.com" rel="noopener noreferrer" target="_blank">Unsplash</a> — swap URLs in <code>menu.json</code> for your own shots.</span>
  </footer>

  <script src="/js/cart.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/order-page.js"></script>
</body>
</html>
